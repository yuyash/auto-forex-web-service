# Development Configuration - HTTP Only (No SSL)

# Upstream servers
upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# HTTP server for development
server {
    listen 80;
    server_name _;

    # Server-sent task update streams. Keep this before the generic /api/
    # location so long-lived streams are not cut by normal API timeouts.
    location ~ ^/api/trading/tasks/(backtest|trading)/[^/]+/stream/$ {
        limit_req zone=api_limit burst=60 delay=20;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1h;
        proxy_read_timeout 1h;
    }

    # API endpoints with rate limiting (100 req/min per IP)
    location /api/ {
        # Rate limiting: 15 req/s per IP, burst of 60 requests
        # First 20 are served immediately; the rest are delayed (queued)
        limit_req zone=api_limit burst=60 delay=20;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Admin endpoints with stricter rate limiting (5 req/min per IP)
    location /api/admin/ {
        # Rate limiting: 5 requests per minute per IP, burst of 5 additional requests
        # Returns 429 Too Many Requests when limit exceeded
        limit_req zone=login_limit burst=5 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Authentication endpoints with strict rate limiting (5 req/min per IP)
    location /api/auth/login {
        # Rate limiting: 5 requests per minute per IP, burst of 3 additional requests
        # Returns 429 Too Many Requests when limit exceeded
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Django media files
    location /media/ {
        alias /app/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend application
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
