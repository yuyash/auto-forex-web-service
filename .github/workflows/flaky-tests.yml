name: Flaky Test Detection

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-flaky:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.13
      - run: uv sync --all-extras
      - name: Repeat critical backend suites
        env:
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-minimum-50-characters-long
          DJANGO_SETTINGS_MODULE: config.settings_test
        run: |
          for i in 1 2 3; do
            echo "executor run #$i"
            uv run pytest tests/unit/trading/tasks/test_executor.py -q
          done
          for i in 1 2; do
            echo "mixins run #$i"
            uv run pytest tests/integration/trading/test_mixins_integration.py -q
          done

  frontend-flaky:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Repeat critical frontend suites
        run: |
          for i in 1 2 3; do
            echo "frontend suite run #$i"
            npx vitest --run src/components/tasks/forms/backtestTaskPayload.test.ts
            npx vitest --run src/components/tasks/detail/taskSettingDefinitions.test.ts
          done
