name: API Docs

on:
  push:
    branches: [main]
    paths:
      - "backend/apps/**/views/**"
      - "backend/apps/**/serializers/**"
      - "backend/apps/**/urls.py"
      - "backend/config/urls.py"
      - "backend/config/settings.py"
      - "backend/pyproject.toml"
      - ".github/workflows/api-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build API Documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Export OpenAPI schema
        env:
          SECRET_KEY: docs-build-key-not-for-production-minimum-50-characters
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          DJANGO_SETTINGS_MODULE: config.settings
          DB_NAME: ""
          DB_HOST: ""
          DB_PORT: ""
          DB_USER: ""
          DB_PASSWORD: ""
        run: |
          mkdir -p ../docs
          uv run python manage.py spectacular --file ../docs/openapi.json --format openapi-json

      - name: Generate ReDoc HTML
        working-directory: .
        run: |
          cat > docs/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Auto Forex Trader API</title>
            <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" />
            <style>body { margin: 0; padding: 0; }</style>
          </head>
          <body>
            <redoc spec-url="openapi.json" expand-responses="200,201" hide-loading></redoc>
            <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
          </body>
          </html>
          HEREDOC

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
