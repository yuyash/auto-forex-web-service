services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: auto-forex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auto-forex"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - forex_network

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: redis
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"
      else
        redis-server --appendonly yes
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$${REDIS_PASSWORD}\" ]; then
          redis-cli -a \"$${REDIS_PASSWORD}\" ping
        else
          redis-cli ping
        fi
        "
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - forex_network

  # Django Backend Application
  backend:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f -H \"Host: $${HEALTHCHECK_HOST:-www.auto-forex.com}\" http://localhost:8000/api/health/ || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      # Environment selection (production loads config.yaml)
      DJANGO_ENV: production
      # Redis auth (must match the redis service requirepass when set)
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Secrets only - all other config comes from environment variables
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-backend
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      HEALTHCHECK_HOST: ${HEALTHCHECK_HOST:-www.auto-forex.com}
      # IMPORTANT: include your public domain(s) here to avoid DisallowedHost.
      # Override via .env if needed.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-auto-forex.com,www.auto-forex.com}
    volumes:
      # Do NOT mount ./backend/config over /app/config in production.
      # /app/config is the Django project package (config/settings.py, asgi.py, etc).
      # Mounting a host directory here can shadow the package and cause:
      #   ModuleNotFoundError: No module named 'config.settings'
      - ./logs:/app/logs
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ${HOME}/.aws:/root/.aws:ro
    expose:
      - "8000"
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && uvicorn config.asgi:application --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    networks:
      - forex_network

  # Celery System Worker for Control-Plane Tasks
  celery:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery
    depends_on:
      - backend
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      # Environment selection (production loads config.yaml)
      DJANGO_ENV: production
      # Redis auth (must match the redis service requirepass when set)
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Secrets only - all other config comes from environment variables
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-system
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      CELERY_ENABLE_STARTUP_RECOVERY: "1"
      CELERY_DEFAULT_WORKER_CONCURRENCY: ${CELERY_DEFAULT_WORKER_CONCURRENCY:-2}
      CELERY_CONTROL_WORKER_CONCURRENCY: ${CELERY_CONTROL_WORKER_CONCURRENCY:-2}
      CELERY_MARKET_WORKER_CONCURRENCY: ${CELERY_MARKET_WORKER_CONCURRENCY:-2}
      CELERY_BACKTEST_WORKER_CONCURRENCY: ${CELERY_BACKTEST_WORKER_CONCURRENCY:-2}
      CELERY_BACKTEST_PUBLISHER_CONCURRENCY: ${CELERY_BACKTEST_PUBLISHER_CONCURRENCY:-2}
      CELERY_TRADING_WORKER_CONCURRENCY: ${CELERY_TRADING_WORKER_CONCURRENCY:-2}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      # Daily tick data loading (optional — task skips if DATABASE/TABLE are empty)
      LOAD_DATA_DATABASE: ${LOAD_DATA_DATABASE:-}
      LOAD_DATA_TABLE: ${LOAD_DATA_TABLE:-}
      LOAD_DATA_INSTRUMENT: ${LOAD_DATA_INSTRUMENT:-C:USD-JPY}
      LOAD_DATA_AWS_PROFILE: ${LOAD_DATA_AWS_PROFILE:-}
      LOAD_DATA_ROLE_ARN: ${LOAD_DATA_ROLE_ARN:-}
      LOAD_DATA_OUTPUT_BUCKET: ${LOAD_DATA_OUTPUT_BUCKET:-}
      # Database backup to S3 (optional — local-only if S3_BUCKET is empty)
      DB_BACKUP_S3_BUCKET: ${DB_BACKUP_S3_BUCKET:-}
      DB_BACKUP_S3_PREFIX: ${DB_BACKUP_S3_PREFIX:-db-backups/}
      DB_BACKUP_ROLE_ARN: ${DB_BACKUP_ROLE_ARN:-}
      DB_BACKUP_AWS_PROFILE: ${DB_BACKUP_AWS_PROFILE:-}
      DB_BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS:-7}
    volumes:
      # See note in backend service: avoid shadowing the Django `config` package.
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config worker -l info --concurrency=${CELERY_CONTROL_WORKER_CONCURRENCY:-2} -Q system
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - forex_network

  celery-default:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery_default
    depends_on:
      - backend
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DJANGO_ENV: production
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-default
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      CELERY_DEFAULT_WORKER_CONCURRENCY: ${CELERY_DEFAULT_WORKER_CONCURRENCY:-2}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      LOAD_DATA_DATABASE: ${LOAD_DATA_DATABASE:-}
      LOAD_DATA_TABLE: ${LOAD_DATA_TABLE:-}
      LOAD_DATA_INSTRUMENT: ${LOAD_DATA_INSTRUMENT:-C:USD-JPY}
      LOAD_DATA_AWS_PROFILE: ${LOAD_DATA_AWS_PROFILE:-}
      LOAD_DATA_ROLE_ARN: ${LOAD_DATA_ROLE_ARN:-}
      LOAD_DATA_OUTPUT_BUCKET: ${LOAD_DATA_OUTPUT_BUCKET:-}
      DB_BACKUP_S3_BUCKET: ${DB_BACKUP_S3_BUCKET:-}
      DB_BACKUP_S3_PREFIX: ${DB_BACKUP_S3_PREFIX:-db-backups/}
      DB_BACKUP_ROLE_ARN: ${DB_BACKUP_ROLE_ARN:-}
      DB_BACKUP_AWS_PROFILE: ${DB_BACKUP_AWS_PROFILE:-}
      DB_BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config worker -l info --concurrency=${CELERY_DEFAULT_WORKER_CONCURRENCY:-2} -Q default
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - forex_network

  celery-market:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery_market
    depends_on:
      - backend
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DJANGO_ENV: production
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-market
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      CELERY_START_MARKET_TICK_SUPERVISOR: "1"
      CELERY_MARKET_WORKER_CONCURRENCY: ${CELERY_MARKET_WORKER_CONCURRENCY:-2}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config worker -l info --concurrency=${CELERY_MARKET_WORKER_CONCURRENCY:-2} -Q market
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - forex_network

  celery-backtest:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery_backtest
    depends_on:
      - backend
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DJANGO_ENV: production
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-backtest
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      CELERY_BACKTEST_WORKER_CONCURRENCY: ${CELERY_BACKTEST_WORKER_CONCURRENCY:-2}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config worker -l info --concurrency=${CELERY_BACKTEST_WORKER_CONCURRENCY:-2} -Q backtest
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - forex_network

  celery-backtest-publisher:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery_backtest_publisher
    depends_on:
      - backend
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DJANGO_ENV: production
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-backtest-publisher
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      CELERY_BACKTEST_PUBLISHER_CONCURRENCY: ${CELERY_BACKTEST_PUBLISHER_CONCURRENCY:-2}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config worker -l info --concurrency=${CELERY_BACKTEST_PUBLISHER_CONCURRENCY:-2} -Q backtest_publisher
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - forex_network

  celery-trading:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery_trading
    depends_on:
      - backend
      - redis
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DJANGO_ENV: production
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-trading
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
      CELERY_TRADING_WORKER_CONCURRENCY: ${CELERY_TRADING_WORKER_CONCURRENCY:-2}
      CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config worker -l info --concurrency=${CELERY_TRADING_WORKER_CONCURRENCY:-2} -Q trading
    mem_limit: 4g
    memswap_limit: 4g
    restart: unless-stopped
    networks:
      - forex_network

  # Celery Beat for Scheduled Tasks
  celery-beat:
    image: ${DOCKERHUB_USERNAME}/forex-trading-backend:latest
    container_name: celery_beat
    depends_on:
      - backend
      - redis
      - postgres
    environment:
      # Environment selection (production loads config.yaml)
      DJANGO_ENV: production
      # Redis auth (must match the redis service requirepass when set)
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Secrets only - all other config comes from environment variables
      DB_PASSWORD: ${DB_PASSWORD:?Database password required}
      DB_APPLICATION_NAME: auto-forex-celery-beat
      SECRET_KEY: ${SECRET_KEY:?Django secret key required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT secret key required}
      OANDA_TOKEN_ENCRYPTION_KEY: ${OANDA_TOKEN_ENCRYPTION_KEY:?OANDA token encryption key required}
    volumes:
      # See note in backend service: avoid shadowing the Django `config` package.
      - ./logs:/app/logs
      - ${HOME}/.aws:/root/.aws:ro
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler --pidfile=/tmp/celerybeat.pid
    restart: unless-stopped
    networks:
      - forex_network

  # React Frontend Application
  frontend:
    image: ${DOCKERHUB_USERNAME}/forex-trading-frontend:latest
    container_name: frontend
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/health.html || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - forex_network

  # Nginx Reverse Proxy with SSL
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    container_name: nginx
    depends_on:
      - backend
      - frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fkSs -H \"Host: $${HEALTHCHECK_HOST:-www.auto-forex.com}\" https://localhost:443/api/health/ > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    command: >
      sh -c "while :; do
        sleep 6h & wait $${!};
        nginx -s reload;
      done & nginx -g 'daemon off;'"
    restart: unless-stopped
    networks:
      - forex_network

  # Certbot for SSL Certificate Management
  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    networks:
      - forex_network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

# Custom network for service communication
networks:
  forex_network:
    driver: bridge
